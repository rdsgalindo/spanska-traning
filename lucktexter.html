<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucktexter – Spanska</title>

<style>
body {
  font-family: "Times New Roman", serif;
  max-width: 760px;
  margin: auto;
  padding: 35px;
  line-height: 1.7;
  background: white;
  color: black;
}

h1 {
  text-align: center;
}

nav {
  text-align: center;
  margin-bottom: 20px;
}

nav a {
  margin: 0 10px;
  text-decoration: none;
  color: black;
}

button {
  display: block;
  width: 100%;
  margin: 8px 0;
  padding: 10px;
  border: 1px solid black;
  background: white;
  font-family: "Times New Roman", serif;
  font-size: 16px;
  cursor: pointer;
  text-align: left;
}

button:hover {
  background: #eeeeee;
}

input {
  width: 100%;
  padding: 10px;
  font-family: "Times New Roman", serif;
  font-size: 18px;
  border: 1px solid black;
  margin: 10px 0;
}

.textbox {
  border: 1px solid black;
  padding: 15px;
  margin: 20px 0;
  font-size: 20px;
}

.progress {
  text-align: center;
  font-weight: bold;
  margin: 15px 0;
}

.feedback {
  font-weight: bold;
}

.correct {
  color: green;
}

.wrong {
  color: red;
}

.explain {
  font-style: italic;
}

.result {
  border: 1px solid black;
  padding: 15px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>Lucktexter – Spanska</h1>

<nav>
  <a href="index.html">Startsida</a>
  <a href="grammatik.html">Grammatik</a>
  <a href="lasforstaelse.html">Läsförståelse</a>
  <a href="diagnos.html">Diagnos</a>
</nav>

<div id="app"></div>

<script>
function normalize(str) {
  return str.toLowerCase().trim();
}

const texts = [
  {
    title: "1. Presens – Mi día",
    parts: [
      {before:"Yo ", after:" a las siete.", answer:["me levanto"], exp:"Yo + reflexivt verb → me levanto."},
      {before:"Yo ", after:" en casa.", answer:["desayuno"], exp:"Yo → desayuno."},
      {before:"Yo ", after:" a la escuela.", answer:["voy"], exp:"Yo → voy."},
      {before:"Yo ", after:" español.", answer:["estudio"], exp:"Yo → estudio."},
      {before:"Yo ", after:" los deberes.", answer:["hago"], exp:"Yo → hago."}
    ]
  },

  {
    title: "2. Presens – Familia",
    parts: [
      {before:"En mi familia ", after:" cinco personas.", answer:["hay"], exp:"Det finns → hay."},
      {before:"Mi madre ", after:" Ana.", answer:["se llama"], exp:"Mi madre = ella → se llama."},
      {before:"Mi padre ", after:" profesor.", answer:["es"], exp:"Yrke/identitet → ser."},
      {before:"Yo ", after:" dos hermanos.", answer:["tengo"], exp:"Yo → tengo."},
      {before:"Mis hermanos ", after:" mucho.", answer:["hablan"], exp:"Mis hermanos = ellos → hablan."}
    ]
  },

  {
    title: "3. Presens – Escuela",
    parts: [
      {before:"Yo ", after:" muchas asignaturas.", answer:["tengo"], exp:"Yo → tengo."},
      {before:"A mí me ", after:" el español.", answer:["gusta"], exp:"El español är singular → gusta."},
      {before:"A mí no me ", after:" las matemáticas.", answer:["gustan"], exp:"Las matemáticas är plural → gustan."},
      {before:"Mi profesor ", after:" simpático.", answer:["es"], exp:"Beskrivning → ser."},
      {before:"Después yo ", after:" a casa.", answer:["voy"], exp:"Yo → voy."}
    ]
  },

  {
    title: "4. Perfekt – Hoy",
    parts: [
      {before:"Hoy yo he ", after:" español.", answer:["estudiado"], exp:"He + particip → estudiado."},
      {before:"Hoy yo he ", after:" música.", answer:["escuchado"], exp:"He + particip → escuchado."},
      {before:"Hoy yo he ", after:" los deberes.", answer:["hecho"], exp:"Hacer → hecho."},
      {before:"Hoy yo he ", after:" una película.", answer:["visto"], exp:"Ver → visto."},
      {before:"Hoy yo he ", after:" pizza.", answer:["comido"], exp:"Comer → comido."}
    ]
  },

  {
    title: "5. Perfekt – Nosotros",
    parts: [
      {before:"Nosotros hemos ", after:" al cine.", answer:["ido"], exp:"Hemos + particip → ido."},
      {before:"Nosotros hemos ", after:" español.", answer:["estudiado"], exp:"Hemos + particip → estudiado."},
      {before:"Nosotros hemos ", after:" comida española.", answer:["probado"], exp:"Probar → probado."},
      {before:"Nosotros hemos ", after:" con amigos.", answer:["hablado"], exp:"Hablar → hablado."},
      {before:"Nosotros hemos ", after:" una serie.", answer:["visto"], exp:"Ver → visto."}
    ]
  },

  {
    title: "6. Blandat – Presens och perfekt",
    parts: [
      {before:"Yo ", after:" quince años.", answer:["tengo"], exp:"Ålder uttrycks med tener."},
      {before:"Yo ", after:" en Suecia.", answer:["vivo"], exp:"Yo → vivo."},
      {before:"Yo he ", after:" mucho español.", answer:["estudiado"], exp:"He + particip → estudiado."},
      {before:"A mí me ", after:" viajar.", answer:["gusta"], exp:"Infinitiv → gusta."},
      {before:"Yo he ", after:" en España.", answer:["estado"], exp:"Estar → estado."}
    ]
  }
];

let currentText = null;
let currentPart = 0;
let score = 0;

function showMenu() {
  const app = document.getElementById("app");
  app.innerHTML = "<h2>Välj lucktext</h2><p>Eleven skriver själv svaret i luckan. Fokus ligger på presens och perfekt.</p>";

  texts.forEach((text, index) => {
    const btn = document.createElement("button");
    btn.textContent = text.title;
    btn.onclick = () => startText(index);
    app.appendChild(btn);
  });
}

function startText(index) {
  currentText = texts[index];
  currentPart = 0;
  score = 0;
  renderPart();
}

function renderPart() {
  const app = document.getElementById("app");
  const part = currentText.parts[currentPart];

  app.innerHTML = "";

  const title = document.createElement("h2");
  title.textContent = currentText.title;
  app.appendChild(title);

  const progress = document.createElement("div");
  progress.className = "progress";
  progress.textContent = "Lucka " + (currentPart + 1) + " av " + currentText.parts.length;
  app.appendChild(progress);

  const box = document.createElement("div");
  box.className = "textbox";
  box.innerHTML = part.before + "<b>______</b>" + part.after;
  app.appendChild(box);

  const input = document.createElement("input");
  input.placeholder = "Skriv svaret här";
  app.appendChild(input);

  const feedback = document.createElement("p");
  feedback.className = "feedback";

  const explanation = document.createElement("p");
  explanation.className = "explain";

  const check = document.createElement("button");
  check.textContent = "Kontrollera";

  check.onclick = () => {
    const value = normalize(input.value);
    const correct = part.answer.some(ans => normalize(ans) === value);

    if (correct) {
      feedback.textContent = "Rätt.";
      feedback.className = "feedback correct";
      score++;
    } else {
      feedback.textContent = "Fel. Rätt svar: " + part.answer[0];
      feedback.className = "feedback wrong";
    }

    explanation.textContent = part.exp;
    input.disabled = true;
    check.disabled = true;

    const next = document.createElement("button");
    next.textContent = currentPart + 1 < currentText.parts.length ? "Nästa lucka" : "Visa resultat";

    next.onclick = () => {
      currentPart++;
      if (currentPart < currentText.parts.length) {
        renderPart();
      } else {
        showResult();
      }
    };

    app.appendChild(feedback);
    app.appendChild(explanation);
    app.appendChild(next);
  };

  app.appendChild(check);

  const back = document.createElement("button");
  back.textContent = "Tillbaka till lucktexter";
  back.onclick = showMenu;
  app.appendChild(back);
}

function showResult() {
  const app = document.getElementById("app");
  const percent = Math.round((score / currentText.parts.length) * 100);

  app.innerHTML = `
    <div class="result">
      <h2>Resultat</h2>
      <p><b>Text:</b> ${currentText.title}</p>
      <p><b>Poäng:</b> ${score} av ${currentText.parts.length}</p>
      <p><b>Resultat:</b> ${percent}%</p>
    </div>
  `;

  const retry = document.createElement("button");
  retry.textContent = "Gör om samma text";
  retry.onclick = () => {
    const index = texts.findIndex(t => t.title === currentText.title);
    startText(index);
  };
  app.appendChild(retry);

  const menu = document.createElement("button");
  menu.textContent = "Tillbaka till alla lucktexter";
  menu.onclick = showMenu;
  app.appendChild(menu);
}

showMenu();
</script>

</body>
</html>
