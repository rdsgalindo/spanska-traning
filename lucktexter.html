<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucktexter – Spanska</title>

<style>
body {
  font-family: "Times New Roman", serif;
  max-width: 760px;
  margin: auto;
  padding: 35px;
  line-height: 1.7;
  background: white;
  color: black;
}

h1 {
  text-align: center;
}

nav {
  text-align: center;
  margin-bottom: 25px;
}

nav a {
  margin: 0 10px;
  text-decoration: none;
  color: black;
}

button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  border: 1px solid black;
  background: white;
  font-family: "Times New Roman", serif;
  font-size: 16px;
  cursor: pointer;
  text-align: left;
}

button:hover {
  background: #eeeeee;
}

input {
  width: 100%;
  padding: 10px;
  font-size: 18px;
  font-family: "Times New Roman", serif;
  border: 1px solid black;
  margin: 10px 0;
}

.textbox {
  border: 1px solid black;
  padding: 18px;
  margin: 20px 0;
  font-size: 20px;
}

.hint {
  font-size: 16px;
  font-style: italic;
  margin-top: 8px;
}

.progress {
  text-align: center;
  font-weight: bold;
  margin: 15px 0;
}

.feedback {
  font-weight: bold;
}

.correct {
  color: green;
}

.wrong {
  color: red;
}

.explain {
  font-style: italic;
}

.result {
  border: 1px solid black;
  padding: 15px;
  margin-top: 20px;
}

.saved {
  border: 1px solid black;
  padding: 12px;
  margin-top: 25px;
}
</style>
</head>

<body>

<h1>Lucktexter – Spanska</h1>

<nav>
  <a href="index.html">Startsida</a>
  <a href="grammatik.html">Grammatik</a>
  <a href="lasforstaelse.html">Läsförståelse</a>
</nav>

<div id="app"></div>

<script>
function normalize(str) {
  return str
    .toLowerCase()
    .trim()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

const texts = [

{
title:"1. Presens – Mi día",
description:"Träna presens och reflexiva verb i vardagsrutiner.",
parts:[
{before:"Yo ", after:" a las siete.", hint:"levantarse", answer:["me levanto"], exp:"Yo + levantarse → me levanto."},
{before:"Yo ", after:" en casa.", hint:"desayunar", answer:["desayuno"], exp:"Yo → desayuno."},
{before:"Yo ", after:" a la escuela.", hint:"ir", answer:["voy"], exp:"Yo + ir → voy."},
{before:"Yo ", after:" español.", hint:"estudiar", answer:["estudio"], exp:"Yo → estudio."},
{before:"Yo ", after:" los deberes.", hint:"hacer", answer:["hago"], exp:"Yo + hacer → hago."},
{before:"Por la noche yo ", after:" a las diez.", hint:"acostarse", answer:["me acuesto"], exp:"Yo + acostarse → me acuesto."}
]
},

{
title:"2. Presens – Mi familia",
description:"Träna ser, tener, hay och verb i tredje person.",
parts:[
{before:"En mi familia ", after:" cinco personas.", hint:"haber", answer:["hay"], exp:"Det finns → hay."},
{before:"Mi madre ", after:" Laura.", hint:"llamarse", answer:["se llama"], exp:"Mi madre = ella → se llama."},
{before:"Mi padre ", after:" profesor.", hint:"ser", answer:["es"], exp:"Yrke/identitet → ser."},
{before:"Yo ", after:" dos hermanas.", hint:"tener", answer:["tengo"], exp:"Yo + tener → tengo."},
{before:"Mis hermanas ", after:" mucho.", hint:"hablar", answer:["hablan"], exp:"Mis hermanas = ellas → hablan."},
{before:"Nosotros ", after:" tiempo juntos los fines de semana.", hint:"pasar", answer:["pasamos"], exp:"Nosotros → pasamos."}
]
},

{
title:"3. Presens – En la escuela",
description:"Träna skola, gustar, ser och ir.",
parts:[
{before:"Yo ", after:" muchas asignaturas.", hint:"tener", answer:["tengo"], exp:"Yo + tener → tengo."},
{before:"A mí me ", after:" el español.", hint:"gustar", answer:["gusta"], exp:"El español är singular → gusta."},
{before:"A mí no me ", after:" las matemáticas.", hint:"gustar", answer:["gustan"], exp:"Las matemáticas är plural → gustan."},
{before:"Mi profesor ", after:" simpático.", hint:"ser", answer:["es"], exp:"Beskrivning → ser."},
{before:"Las clases ", after:" a las ocho.", hint:"empezar", answer:["empiezan"], exp:"Las clases = ellas → empiezan."},
{before:"Después yo ", after:" a casa.", hint:"ir", answer:["voy"], exp:"Yo + ir → voy."}
]
},

{
title:"4. Presens – En una tienda",
description:"Träna kläder, köpa, vilja och beskrivningar.",
parts:[
{before:"Yo ", after:" comprar una camiseta.", hint:"querer", answer:["quiero"], exp:"Yo + querer → quiero."},
{before:"La camiseta ", after:" azul.", hint:"ser", answer:["es"], exp:"Beskrivning → ser."},
{before:"Yo ", after:" talla mediana.", hint:"necesitar", answer:["necesito"], exp:"Yo → necesito."},
{before:"La dependienta me ", after:" qué talla necesito.", hint:"preguntar", answer:["pregunta"], exp:"La dependienta = ella → pregunta."},
{before:"Al final yo ", after:" la camiseta.", hint:"comprar", answer:["compro"], exp:"Yo → compro."},
{before:"La camiseta no ", after:" muy cara.", hint:"ser", answer:["es"], exp:"Beskrivning → ser."}
]
},

{
title:"5. Presens – El móvil",
description:"Träna presens, åsikter och mobilanvändning.",
parts:[
{before:"Yo ", after:" el móvil todos los días.", hint:"usar", answer:["uso"], exp:"Yo → uso."},
{before:"Yo ", after:" con mis amigos.", hint:"hablar", answer:["hablo"], exp:"Yo → hablo."},
{before:"A mí me ", after:" el móvil.", hint:"gustar", answer:["gusta"], exp:"El móvil är singular → gusta."},
{before:"Pero yo ", after:" demasiado tiempo con él.", hint:"pasar", answer:["paso"], exp:"Yo → paso."},
{before:"Mis padres ", after:" que debería usarlo menos.", hint:"decir", answer:["dicen"], exp:"Mis padres = ellos → dicen."},
{before:"Yo ", after:" usarlo de forma responsable.", hint:"intentar", answer:["intento"], exp:"Yo → intento."}
]
},

{
title:"6. Perfekt – Hoy",
description:"Träna perfekt med yo he + particip.",
parts:[
{before:"Hoy yo he ", after:" español.", hint:"estudiar", answer:["estudiado"], exp:"He + particip → estudiado."},
{before:"Hoy yo he ", after:" música.", hint:"escuchar", answer:["escuchado"], exp:"Escuchar → escuchado."},
{before:"Hoy yo he ", after:" los deberes.", hint:"hacer", answer:["hecho"], exp:"Hacer → hecho."},
{before:"Hoy yo he ", after:" una película.", hint:"ver", answer:["visto"], exp:"Ver → visto."},
{before:"Hoy yo he ", after:" pizza.", hint:"comer", answer:["comido"], exp:"Comer → comido."},
{before:"Hoy yo he ", after:" con mis amigos.", hint:"hablar", answer:["hablado"], exp:"Hablar → hablado."}
]
},

{
title:"7. Perfekt – Nosotros",
description:"Träna perfekt med nosotros hemos + particip.",
parts:[
{before:"Nosotros hemos ", after:" al cine.", hint:"ir", answer:["ido"], exp:"Ir → ido."},
{before:"Nosotros hemos ", after:" español.", hint:"estudiar", answer:["estudiado"], exp:"Estudiar → estudiado."},
{before:"Nosotros hemos ", after:" comida española.", hint:"probar", answer:["probado"], exp:"Probar → probado."},
{before:"Nosotros hemos ", after:" con amigos.", hint:"hablar", answer:["hablado"], exp:"Hablar → hablado."},
{before:"Nosotros hemos ", after:" una serie.", hint:"ver", answer:["visto"], exp:"Ver → visto."},
{before:"Nosotros hemos ", after:" mucho esta semana.", hint:"trabajar", answer:["trabajado"], exp:"Trabajar → trabajado."}
]
},

{
title:"8. Presens och perfekt – Blandat",
description:"Träna skillnaden mellan vad man gör och vad man har gjort.",
parts:[
{before:"Yo ", after:" quince años.", hint:"tener", answer:["tengo"], exp:"Ålder uttrycks med tener."},
{before:"Yo ", after:" en Suecia.", hint:"vivir", answer:["vivo"], exp:"Yo → vivo."},
{before:"Yo he ", after:" mucho español.", hint:"estudiar", answer:["estudiado"], exp:"He + particip → estudiado."},
{before:"A mí me ", after:" viajar.", hint:"gustar", answer:["gusta"], exp:"Infinitiv → gusta."},
{before:"Yo he ", after:" en España.", hint:"estar", answer:["estado"], exp:"Estar → estado."},
{before:"Yo ", after:" español porque es útil.", hint:"estudiar", answer:["estudio"], exp:"Presens: yo estudio."}
]
},

{
title:"9. Framtid – Ir a + infinitiv",
description:"Träna framtid med voy a, vas a, vamos a.",
parts:[
{before:"Yo ", after:" estudiar mañana.", hint:"ir a", answer:["voy a"], exp:"Yo → voy a."},
{before:"Tú ", after:" viajar este verano.", hint:"ir a", answer:["vas a"], exp:"Tú → vas a."},
{before:"Ella ", after:" trabajar mañana.", hint:"ir a", answer:["va a"], exp:"Ella → va a."},
{before:"Nosotros ", after:" visitar Madrid.", hint:"ir a", answer:["vamos a"], exp:"Nosotros → vamos a."},
{before:"Mis amigos ", after:" jugar al fútbol.", hint:"ir a", answer:["van a"], exp:"Mis amigos = ellos → van a."},
{before:"Yo ", after:" comprar ropa.", hint:"ir a", answer:["voy a"], exp:"Yo → voy a."}
]
},

{
title:"10. Tener que + infinitiv",
description:"Träna att uttrycka måste.",
parts:[
{before:"Yo ", after:" estudiar hoy.", hint:"tener que", answer:["tengo que"], exp:"Yo → tengo que."},
{before:"Tú ", after:" hacer los deberes.", hint:"tener que", answer:["tienes que"], exp:"Tú → tienes que."},
{before:"Ella ", after:" levantarse temprano.", hint:"tener que", answer:["tiene que"], exp:"Ella → tiene que."},
{before:"Nosotros ", after:" practicar más.", hint:"tener que", answer:["tenemos que"], exp:"Nosotros → tenemos que."},
{before:"Mis amigos ", after:" leer el texto.", hint:"tener que", answer:["tienen que"], exp:"Mis amigos = ellos → tienen que."},
{before:"Yo no ", after:" trabajar mañana.", hint:"tener que", answer:["tengo que"], exp:"No tengo que = jag måste inte."}
]
},

{
title:"11. Ser / estar / hay",
description:"Träna ser, estar och hay i sammanhang.",
parts:[
{before:"Madrid ", after:" en España.", hint:"estar", answer:["está"], exp:"Plats → estar."},
{before:"Mi escuela ", after:" grande.", hint:"ser", answer:["es"], exp:"Beskrivning → ser."},
{before:"En mi clase ", after:" muchos estudiantes.", hint:"haber", answer:["hay"], exp:"Det finns → hay."},
{before:"Yo ", after:" cansado hoy.", hint:"estar", answer:["estoy"], exp:"Tillfälligt tillstånd → estar."},
{before:"Barcelona ", after:" una ciudad bonita.", hint:"ser", answer:["es"], exp:"Definition/beskrivning → ser."},
{before:"La puerta ", after:" abierta.", hint:"estar", answer:["está"], exp:"Tillstånd → estar."}
]
},

{
title:"12. Opiniones",
description:"Träna åsiktsfraser och sambandsord.",
parts:[
{before:"Yo ", after:" que el español es importante.", hint:"creer", answer:["creo"], exp:"Yo → creo."},
{before:"Yo ", after:" de acuerdo.", hint:"estar", answer:["estoy"], exp:"Estoy de acuerdo."},
{before:"Yo no ", after:" de acuerdo.", hint:"estar", answer:["estoy"], exp:"No estoy de acuerdo."},
{before:"En mi opinión, esto ", after:" importante.", hint:"ser", answer:["es"], exp:"Beskrivning → ser."},
{before:"Esto ", after:" una buena idea.", hint:"ser", answer:["es"], exp:"Es una buena idea."},
{before:"Yo ", after:" que estudiar idiomas es útil.", hint:"pensar", answer:["pienso"], exp:"Yo → pienso."}
]
}

];

let currentText = null;
let currentPart = 0;
let score = 0;

function showMenu() {
  const app = document.getElementById("app");
  app.innerHTML = "<h2>Välj lucktext</h2><p>Eleven skriver själv svaret. Verb eller struktur står inom parentes.</p>";

  texts.forEach((text, index) => {
    const btn = document.createElement("button");
    btn.textContent = text.title;
    btn.onclick = () => startText(index);
    app.appendChild(btn);
  });

  const saved = document.createElement("div");
  saved.className = "saved";
  saved.innerHTML = "<h2>Sparade resultat på denna enhet</h2>";

  let hasSaved = false;

  texts.forEach(text => {
    const value = localStorage.getItem("lucktext_" + text.title);
    if (value !== null) {
      hasSaved = true;
      const p = document.createElement("p");
      p.textContent = text.title + ": " + value + "%";
      saved.appendChild(p);
    }
  });

  if (hasSaved) {
    app.appendChild(saved);
  }
}

function startText(index) {
  currentText = texts[index];
  currentPart = 0;
  score = 0;
  renderPart();
}

function renderPart() {
  const app = document.getElementById("app");
  const part = currentText.parts[currentPart];

  app.innerHTML = "";

  const title = document.createElement("h2");
  title.textContent = currentText.title;
  app.appendChild(title);

  const description = document.createElement("p");
  description.textContent = currentText.description;
  app.appendChild(description);

  const progress = document.createElement("div");
  progress.className = "progress";
  progress.textContent = "Lucka " + (currentPart + 1) + " av " + currentText.parts.length;
  app.appendChild(progress);

  const box = document.createElement("div");
  box.className = "textbox";
  box.innerHTML =
    part.before +
    "<b>______</b>" +
    part.after +
    "<div class='hint'>(" + part.hint + ")</div>";
  app.appendChild(box);

  const input = document.createElement("input");
  input.placeholder = "Skriv svaret här";
  app.appendChild(input);

  const feedback = document.createElement("p");
  feedback.className = "feedback";

  const explanation = document.createElement("p");
  explanation.className = "explain";

  const check = document.createElement("button");
  check.textContent = "Kontrollera";

  check.onclick = () => {
    const value = normalize(input.value);
    const correct = part.answer.some(ans => normalize(ans) === value);

    if (correct) {
      feedback.textContent = "Rätt.";
      feedback.className = "feedback correct";
      score++;
    } else {
      feedback.textContent = "Fel. Rätt svar: " + part.answer[0];
      feedback.className = "feedback wrong";
    }

    explanation.textContent = part.exp;

    input.disabled = true;
    check.disabled = true;

    const next = document.createElement("button");
    next.textContent = currentPart + 1 < currentText.parts.length ? "Nästa lucka" : "Visa resultat";

    next.onclick = () => {
      currentPart++;
      if (currentPart < currentText.parts.length) {
        renderPart();
      } else {
        showResult();
      }
    };

    app.appendChild(feedback);
    app.appendChild(explanation);
    app.appendChild(next);
  };

  app.appendChild(check);

  const back = document.createElement("button");
  back.textContent = "Tillbaka till alla lucktexter";
  back.onclick = showMenu;
  app.appendChild(back);

  input.focus();
}

function showResult() {
  const app = document.getElementById("app");
  const percent = Math.round((score / currentText.parts.length) * 100);

  localStorage.setItem("lucktext_" + currentText.title, percent);

  app.innerHTML = `
    <div class="result">
      <h2>Resultat</h2>
      <p><b>Text:</b> ${currentText.title}</p>
      <p><b>Poäng:</b> ${score} av ${currentText.parts.length}</p>
      <p><b>Resultat:</b> ${percent}%</p>
    </div>
  `;

  const retry = document.createElement("button");
  retry.textContent = "Gör om samma text";
  retry.onclick = () => {
    const index = texts.findIndex(t => t.title === currentText.title);
    startText(index);
  };
  app.appendChild(retry);

  const menu = document.createElement("button");
  menu.textContent = "Tillbaka till alla lucktexter";
  menu.onclick = showMenu;
  app.appendChild(menu);
}

showMenu();
</script>

</body>
</html>
