<script>
function shuffle(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

let currentSection = null;
let currentQuestion = 0;
let score = 0;

function showMenu() {
  const app = document.getElementById("app");
  app.innerHTML = "<h2>Välj avsnitt</h2><p class='menu-intro'>Välj ett grammatikområde. Du får en fråga i taget. Frågorna och svarsalternativen slumpas varje gång.</p>";

  sections.forEach((section, index) => {
    const btn = document.createElement("button");
    btn.textContent = section.title;
    btn.onclick = () => startSection(index);
    app.appendChild(btn);
  });

  const saved = document.createElement("div");
  saved.className = "result";
  saved.innerHTML = "<h2>Sparade resultat på denna enhet</h2>";

  let hasSaved = false;

  sections.forEach(section => {
    const value = localStorage.getItem("grammatik_" + section.title);
    if (value !== null) {
      hasSaved = true;
      const p = document.createElement("p");
      p.textContent = section.title + ": " + value + "%";
      saved.appendChild(p);
    }
  });

  if (hasSaved) {
    app.appendChild(saved);
  }
}

function startSection(index) {
  currentSection = JSON.parse(JSON.stringify(sections[index]));
  currentSection.questions = shuffle(currentSection.questions);
  currentQuestion = 0;
  score = 0;
  renderQuestion();
}

function renderQuestion() {
  const app = document.getElementById("app");
  const q = currentSection.questions[currentQuestion];

  app.innerHTML = "";

  const progress = document.createElement("div");
  progress.className = "progress";
  progress.textContent = "Fråga " + (currentQuestion + 1) + " av " + currentSection.questions.length;
  app.appendChild(progress);

  const heading = document.createElement("h2");
  heading.textContent = currentSection.title;
  app.appendChild(heading);

  const qText = document.createElement("p");
  qText.innerHTML = "<b>" + q.q + "</b>";
  app.appendChild(qText);

  const feedback = document.createElement("p");
  feedback.className = "feedback";

  const explain = document.createElement("p");
  explain.className = "explain";

  const exam = document.getElementById("examMode").checked;

  const options = shuffle(q.a.map((text, index) => ({
    text: text,
    correct: index === q.c
  })));

  let answered = false;

  options.forEach(option => {
    const btn = document.createElement("button");
    btn.textContent = option.text;

    btn.onclick = () => {
      if (answered) return;
      answered = true;

      const buttons = app.querySelectorAll("button");
      buttons.forEach(b => b.disabled = true);

      if (option.correct) {
        btn.style.background = "green";
        btn.style.color = "white";
        feedback.textContent = "Rätt.";
        feedback.className = "feedback correct";
        score++;
      } else {
        btn.style.background = "red";
        btn.style.color = "white";
        feedback.textContent = "Fel.";
        feedback.className = "feedback wrong";

        if (!exam) {
          buttons.forEach(b => {
            const originalCorrect = q.a[q.c];
            if (b.textContent === originalCorrect) {
              b.style.background = "green";
              b.style.color = "white";
            }
          });
        }
      }

      if (!exam) {
        explain.textContent = q.exp;
      }

      const next = document.createElement("button");
      next.textContent = currentQuestion + 1 < currentSection.questions.length ? "Nästa fråga" : "Visa resultat";

      next.onclick = () => {
        currentQuestion++;
        if (currentQuestion < currentSection.questions.length) {
          renderQuestion();
        } else {
          showResult();
        }
      };

      app.appendChild(feedback);
      app.appendChild(explain);
      app.appendChild(next);
    };

    app.appendChild(btn);
  });

  const menuBtn = document.createElement("button");
  menuBtn.textContent = "Tillbaka till avsnitt";
  menuBtn.onclick = showMenu;
  app.appendChild(menuBtn);
}

function showResult() {
  const app = document.getElementById("app");
  const percent = Math.round((score / currentSection.questions.length) * 100);

  localStorage.setItem("grammatik_" + currentSection.title, percent);

  app.innerHTML = `
    <div class="result">
      <h2>Resultat</h2>
      <p><b>Avsnitt:</b> ${currentSection.title}</p>
      <p><b>Poäng:</b> ${score} av ${currentSection.questions.length}</p>
      <p><b>Resultat:</b> ${percent}%</p>
    </div>
  `;

  const retry = document.createElement("button");
  retry.textContent = "Gör om samma avsnitt";
  retry.onclick = () => {
    const index = sections.findIndex(s => s.title === currentSection.title);
    startSection(index);
  };

  const menu = document.createElement("button");
  menu.textContent = "Tillbaka till alla avsnitt";
  menu.onclick = showMenu;

  app.appendChild(retry);
  app.appendChild(menu);
}

showMenu();
</script>

</body>
</html>
