<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammatik – Spanska</title>

<style>
body {
  font-family: "Times New Roman", serif;
  background: white;
  color: black;
  max-width: 760px;
  margin: auto;
  padding: 30px;
  line-height: 1.6;
}

h1 {
  text-align: center;
}

h2 {
  margin-top: 35px;
  border-bottom: 1px solid black;
}

nav {
  margin-bottom: 20px;
  text-align: center;
}

nav a {
  margin: 0 10px;
  text-decoration: none;
  color: black;
}

.scorebox {
  border: 1px solid black;
  padding: 10px;
  margin-bottom: 25px;
  font-weight: bold;
}

.question {
  margin-top: 18px;
}

button {
  display: block;
  margin: 6px 0;
  padding: 7px;
  width: 100%;
  border: 1px solid black;
  background: white;
  font-family: "Times New Roman", serif;
  cursor: pointer;
}

button:hover {
  background: #eee;
}

.feedback {
  font-weight: bold;
}

.correct { color: green; }
.wrong { color: red; }

.explain {
  font-style: italic;
  margin-top: 5px;
}

textarea {
  width: 100%;
  min-height: 90px;
  border: 1px solid black;
  padding: 8px;
  font-family: "Times New Roman", serif;
}

.model {
  display: none;
  margin-top: 10px;
  border: 1px solid black;
  padding: 10px;
}

hr {
  margin: 40px 0;
}
</style>
</head>

<body>

<h1>Grammatik – Spanska</h1>

<nav>
  <a href="index.html">Startsida</a>
  <a href="lasforstaelse.html">Läsförståelse</a>
</nav>

<div class="scorebox">
Poäng: <span id="score">0</span> / <span id="total">0</span>
</div>

<div id="content"></div>

<script>

let score = 0;
let total = 0;

const sections = [

{
title: "Presens",
questions: [
{q:"Yo ___ en Suecia.",a:["vive","vivo","vives","viven"],c:1,exp:"Yo → vivo"},
{q:"Tú ___ español.",a:["hablo","hablas","habla","hablan"],c:1,exp:"Tú → hablas"},
{q:"Ella ___ en casa.",a:["vive","vivo","vives","viven"],c:0,exp:"Ella → vive"},
{q:"Nosotros ___ fútbol.",a:["jugamos","juegan","juega","juego"],c:0,exp:"Nosotros → jugamos"},
{q:"Ellos ___ mucho.",a:["estudian","estudia","estudio","estudiamos"],c:0,exp:"Ellos → estudian"},
{q:"Mi madre ___ en una tienda.",a:["trabaja","trabajo","trabajas","trabajan"],c:0,exp:"Tredje person → trabaja"}
]
},

{
title: "Gustar",
questions: [
{q:"Me ___ la música.",a:["gusta","gustan","gusto","gustas"],c:0,exp:"Singular → gusta"},
{q:"Me ___ los libros.",a:["gusta","gustan","gusto","gustas"],c:1,exp:"Plural → gustan"},
{q:"Me ___ estudiar.",a:["gusta","gustan","gusto","gustas"],c:0,exp:"Verb → gusta"},
{q:"A Ana le ___ el fútbol.",a:["gusta","gustan","gusto","gustas"],c:0,exp:"Singular → gusta"},
{q:"No me ___ las matemáticas.",a:["gusta","gustan","gusto","gustas"],c:1,exp:"Plural → gustan"}
]
},

{
title: "Ser / Estar",
questions: [
{q:"Yo ___ estudiante.",a:["soy","estoy","es","está"],c:0,exp:"Identitet → ser"},
{q:"Yo ___ cansado.",a:["soy","estoy","es","está"],c:1,exp:"Tillstånd → estar"},
{q:"Madrid ___ en España.",a:["es","está","soy","hay"],c:1,exp:"Plats → estar"},
{q:"La casa ___ grande.",a:["es","está","hay","tiene"],c:0,exp:"Egenskap → ser"},
{q:"La puerta ___ abierta.",a:["es","está","hay","tiene"],c:1,exp:"Tillstånd → estar"}
]
},

{
title: "Perfekt",
questions: [
{q:"He ___ español.",a:["estudiado","estudio","estudiar","estudia"],c:0,exp:"He + particip"},
{q:"He ___ una película.",a:["visto","ver","veo","vi"],c:0,exp:"Ver → visto"},
{q:"Hemos ___ al cine.",a:["ido","ir","vamos","fuimos"],c:0,exp:"Ir → ido"},
{q:"Nunca he ___ en España.",a:["estado","estar","estoy","estuve"],c:0,exp:"He + estado"}
]
},

{
title: "Por / Para",
questions: [
{q:"Trabajo ___ aprender.",a:["por","para","con","sin"],c:1,exp:"Syfte → para"},
{q:"Lo hago ___ ti.",a:["por","para","con","sin"],c:0,exp:"Orsak → por"},
{q:"Estudio ___ el examen.",a:["por","para","con","sin"],c:1,exp:"Syfte → para"}
]
},

{
title: "Frågeord",
questions: [
{q:"¿___ vives?",a:["Qué","Dónde","Cuándo","Quién"],c:1,exp:"Dónde = var"},
{q:"¿___ te llamas?",a:["Cómo","Qué","Dónde","Por qué"],c:0,exp:"Cómo te llamas"},
{q:"¿___ estudias español?",a:["Por qué","Dónde","Quién","Cuánto"],c:0,exp:"Por qué = varför"}
]
}

];

function render(){

const container = document.getElementById("content");

sections.forEach(sec => {

const section = document.createElement("section");

const title = document.createElement("h2");
title.textContent = sec.title;
section.appendChild(title);

sec.questions.forEach((q, index) => {

total++;

const qDiv = document.createElement("div");
qDiv.className = "question";

const qText = document.createElement("p");
qText.innerHTML = "<b>" + (index+1) + ". " + q.q + "</b>";
qDiv.appendChild(qText);

const feedback = document.createElement("p");
const explanation = document.createElement("p");
explanation.className = "explain";

let locked = false;

q.a.forEach((ans, i) => {

const btn = document.createElement("button");
btn.textContent = ans;

btn.onclick = () => {

if (locked) return;
locked = true;

const buttons = qDiv.querySelectorAll("button");
buttons.forEach(b => b.disabled = true);

if (i === q.c){
btn.style.background = "green";
btn.style.color = "white";
feedback.textContent = "Rätt.";
feedback.className = "feedback correct";
score++;
} else {
btn.style.background = "red";
btn.style.color = "white";
buttons[q.c].style.background = "green";
buttons[q.c].style.color = "white";
feedback.textContent = "Fel.";
feedback.className = "feedback wrong";
}

explanation.textContent = q.exp;
document.getElementById("score").textContent = score;

};

qDiv.appendChild(btn);

});

qDiv.appendChild(feedback);
qDiv.appendChild(explanation);
section.appendChild(qDiv);

});

container.appendChild(section);

});

document.getElementById("total").textContent = total;

addWritingSection();
}

function addWritingSection(){

const container = document.getElementById("content");

const section = document.createElement("section");

const title = document.createElement("h2");
title.textContent = "Skrivuppgifter";
section.appendChild(title);

const tasks = [
{
task:"Skriv 4 meningar om din dag (presens).",
model:"Yo me levanto a las siete. Voy a la escuela. Estudio español. Juego fútbol."
},
{
task:"Skriv vad du har gjort idag (perfekt).",
model:"Hoy he estudiado español. He hablado con mis amigos."
},
{
task:"Beskriv dig själv.",
model:"Soy estudiante. Soy simpático. Estoy cansado hoy."
}
];

tasks.forEach(t => {

const div = document.createElement("div");

const p = document.createElement("p");
p.textContent = t.task;

const textarea = document.createElement("textarea");

const btn = document.createElement("button");
btn.textContent = "Visa exempel";

const model = document.createElement("div");
model.className = "model";
model.textContent = t.model;

btn.onclick = () => {
model.style.display = "block";
};

div.appendChild(p);
div.appendChild(textarea);
div.appendChild(btn);
div.appendChild(model);

section.appendChild(div);

});

container.appendChild(section);
}

render();

</script>

</body>
</html>
