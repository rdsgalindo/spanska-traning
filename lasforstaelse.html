<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Läsförståelse – Spanska</title>

<style>
:root {
  --bg: #f6f2ec;
  --card: #ffffff;
  --main: #8b2f16;
  --main-dark: #6f2410;
  --soft: #fff4e8;
  --text: #1f2937;
  --muted: #6b7280;
  --border: #ead7c4;
  --green: #15803d;
  --red: #b91c1c;
  --bas: #2563eb;
  --mellan: #ca8a04;
  --utmaning: #9333ea;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background:
    radial-gradient(circle at top left, #ffe3c2, transparent 35%),
    linear-gradient(180deg, #f8efe5 0%, #f6f2ec 100%);
  color: var(--text);
  line-height: 1.6;
}

header {
  background: linear-gradient(135deg, var(--main), #b45309);
  color: white;
  padding: 34px 20px;
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 2.2rem;
}

header p {
  margin: 8px 0 0;
  opacity: 0.95;
}

main {
  max-width: 1050px;
  margin: auto;
  padding: 20px;
}

nav {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  padding: 12px;
  border-radius: 16px;
  margin: -26px auto 20px;
  max-width: 1050px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  position: sticky;
  top: 10px;
  z-index: 10;
}

nav a {
  display: inline-block;
  margin: 5px 8px;
  padding: 8px 12px;
  background: var(--soft);
  color: var(--main);
  font-weight: bold;
  text-decoration: none;
  border-radius: 999px;
}

nav a:hover {
  background: #fed7aa;
}

.scorebox {
  background: white;
  border: 1px solid var(--border);
  border-left: 6px solid var(--main);
  padding: 14px 18px;
  border-radius: 16px;
  font-weight: bold;
  margin-bottom: 20px;
  box-shadow: 0 6px 16px rgba(0,0,0,0.06);
}

.intro {
  background: rgba(255,255,255,0.9);
  border: 1px solid var(--border);
  padding: 18px;
  border-radius: 16px;
  margin-bottom: 22px;
}

.level {
  background: var(--card);
  padding: 24px;
  margin: 26px 0;
  border-radius: 20px;
  box-shadow: 0 10px 26px rgba(0,0,0,0.08);
  border: 1px solid var(--border);
}

.text-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

h2 {
  color: var(--main);
  margin-bottom: 8px;
}

.badge {
  display: inline-block;
  color: white;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 0.85rem;
  font-weight: bold;
  letter-spacing: 0.04em;
}

.bas { background: var(--bas); }
.mellan { background: var(--mellan); }
.utmaning { background: var(--utmaning); }

.textbox {
  background: linear-gradient(180deg, #fff8ef, #fffdf9);
  border: 1px solid var(--border);
  border-left: 6px solid var(--main);
  padding: 18px;
  margin: 16px 0 20px;
  border-radius: 16px;
  font-size: 1.05rem;
}

.question {
  background: #fafafa;
  margin-top: 14px;
  padding: 16px;
  border-radius: 14px;
  border: 1px solid #e5e7eb;
}

.question p {
  margin-top: 0;
}

button {
  display: block;
  margin: 8px 0;
  padding: 12px 14px;
  width: 100%;
  border: 1px solid transparent;
  border-radius: 12px;
  background: #f3f4f6;
  color: #111827;
  cursor: pointer;
  text-align: left;
  font-size: 1rem;
  transition: 0.15s;
}

button:hover {
  background: #ffe7cc;
  border-color: #fdba74;
}

button:disabled {
  cursor: default;
  opacity: 0.95;
}

.feedback {
  font-weight: bold;
  margin: 8px 0 0;
}

.correct {
  color: var(--green);
}

.wrong {
  color: var(--red);
}

.small {
  color: var(--muted);
  font-size: 0.95rem;
}

@media (max-width: 700px) {
  header h1 {
    font-size: 1.6rem;
  }

  main {
    padding: 12px;
  }

  .level {
    padding: 16px;
  }
}
</style>
</head>

<body>

<header>
  <h1>Läsförståelse – Spanska</h1>
  <p>Träna texter på bas-, mellan- och utmaningsnivå</p>
</header>

<main>

<nav>
  <a href="index.html">Startsida</a>
  <a href="grammatik.html">Grammatik</a>
  <a href="diagnos.html">Diagnos</a>
</nav>

<div class="scorebox">
  Total poäng: <span id="score">0</span> / <span id="total">0</span>
</div>

<div class="intro">
  <b>Instruktion:</b> Läs varje text noggrant. Svara på frågorna. Du får direkt feedback och rätt svar visas om du svarar fel.
</div>

<div id="content"></div>

</main>

<script>
let score = 0;
let total = 0;

const texts = [

  {
    level: "BAS",
    title: "Texto 1 – Presentación",
    text: `Hola, me llamo Ana y tengo quince años. Vivo en Estocolmo con mi madre, mi padre y mi hermano. Hablo sueco, inglés y un poco de español. En la escuela tengo muchas asignaturas, pero me gusta más español porque es divertido. No me gustan mucho las matemáticas porque son difíciles. Después de la escuela escucho música o hablo con mis amigos.`,
    questions: [
      {
        q: "¿Qué podemos entender sobre la vida de Ana?",
        a: [
          "Trabaja y vive sola",
          "Vive con su familia y estudia",
          "Viaja mucho por el mundo",
          "No va a la escuela"
        ],
        c: 1
      },
      {
        q: "¿Cuál es su actitud hacia las matemáticas?",
        a: [
          "Le encantan",
          "No tiene opinión",
          "Le resultan difíciles",
          "Quiere estudiarlas más"
        ],
        c: 2
      },
      {
        q: "¿Por qué le gusta el español?",
        a: [
          "Porque es obligatorio",
          "Porque es fácil",
          "Porque es divertido",
          "Porque lo usa en casa"
        ],
        c: 2
      },
      {
        q: "¿Qué significa “después de la escuela” en el texto?",
        a: [
          "Antes de ir a la escuela",
          "Durante las clases",
          "Cuando termina el día escolar",
          "El fin de semana"
        ],
        c: 2
      }
    ]
  },

  {
    level: "BAS",
    title: "Texto 2 – Mi familia",
    text: `Me llamo Carlos. En mi familia hay cinco personas: mi madre, mi padre, mis dos hermanas y yo. Mi madre se llama Laura y trabaja en una tienda. Mi padre es profesor. Mis hermanas son pequeñas y hablan mucho. Me gusta estar con mi familia, pero a veces necesito tiempo solo.`,
    questions: [
      {
        q: "¿Cómo es la familia de Carlos?",
        a: [
          "Pequeña y tranquila",
          "Grande y complicada",
          "De tamaño medio con niños pequeños",
          "Solo viven dos personas"
        ],
        c: 2
      },
      {
        q: "¿Qué podemos entender sobre sus hermanas?",
        a: [
          "Son mayores que él",
          "Son calladas",
          "Hablan mucho",
          "No viven en casa"
        ],
        c: 2
      },
      {
        q: "¿Qué indica “pero a veces necesito tiempo solo”?",
        a: [
          "No le gusta su familia",
          "Nunca está en casa",
          "A veces quiere estar solo",
          "Quiere cambiar de familia"
        ],
        c: 2
      },
      {
        q: "¿Cuál es la idea principal?",
        a: [
          "Su trabajo",
          "Su escuela",
          "Descripción de su familia",
          "Sus amigos"
        ],
        c: 2
      }
    ]
  },

  {
    level: "BAS",
    title: "Texto 3 – En la tienda",
    text: `Voy a una tienda porque necesito ropa nueva. Me gustan las camisetas azules y verdes. La dependienta me pregunta qué talla necesito. Digo que talla mediana. Al final compro una camiseta azul porque es bonita y no es muy cara.`,
    questions: [
      {
        q: "¿Qué podemos entender sobre la compra?",
        a: [
          "Compra algo caro",
          "Compra algo práctico y económico",
          "No compra nada",
          "Compra ropa para otra persona"
        ],
        c: 1
      },
      {
        q: "¿Qué influye en su decisión?",
        a: [
          "La marca",
          "El precio y el aspecto",
          "La opinión de la dependienta",
          "El tamaño de la tienda"
        ],
        c: 1
      },
      {
        q: "¿Qué significa “talla mediana”?",
        a: [
          "Color",
          "Precio",
          "Tamaño",
          "Material"
        ],
        c: 2
      },
      {
        q: "¿Cuál es el propósito del texto?",
        a: [
          "Contar una experiencia de compra",
          "Explicar cómo funciona una tienda",
          "Comparar precios",
          "Hablar de moda en general"
        ],
        c: 0
      }
    ]
  },

  {
    level: "MELLAN",
    title: "Texto 4 – Rutina",
    text: `Tengo una rutina bastante normal. Me levanto temprano y voy a la escuela. Me gusta la educación física porque puedo moverme, pero también me interesa la historia. Después de la escuela hago los deberes y, si tengo tiempo, veo a mis amigos.`,
    questions: [
      {
        q: "¿Cómo es su rutina?",
        a: [
          "Muy diferente",
          "Bastante normal",
          "Muy complicada",
          "Muy corta"
        ],
        c: 1
      },
      {
        q: "¿Qué podemos entender sobre sus intereses?",
        a: [
          "Solo le gusta el deporte",
          "Solo le gustan las materias teóricas",
          "Tiene intereses variados",
          "No le gusta estudiar"
        ],
        c: 2
      },
      {
        q: "¿Qué indica “si tengo tiempo”?",
        a: [
          "Siempre tiene tiempo",
          "Nunca tiene tiempo",
          "Depende del día",
          "Tiene mucho tiempo"
        ],
        c: 2
      },
      {
        q: "¿Cuál es la idea principal?",
        a: [
          "Descripción de su rutina diaria",
          "Opinión sobre la escuela",
          "Relación con sus amigos",
          "Problemas en la escuela"
        ],
        c: 0
      }
    ]
  },

  {
    level: "MELLAN",
    title: "Texto 5 – El móvil",
    text: `Uso el móvil todos los días. Me gusta, pero sé que paso demasiado tiempo con él. Mis padres piensan que debería usarlo menos. Yo entiendo su opinión, pero creo que también puede ser útil.`,
    questions: [
      {
        q: "¿Cuál es el conflicto principal?",
        a: [
          "No tiene móvil",
          "Problemas técnicos",
          "Uso excesivo del móvil",
          "Falta de tiempo libre"
        ],
        c: 2
      },
      {
        q: "¿Qué significa “aunque” en este contexto?",
        a: [
          "Porque",
          "Aunque / a pesar de",
          "Entonces",
          "También"
        ],
        c: 1
      },
      {
        q: "¿Cuál es la opinión del hablante?",
        a: [
          "El móvil es solo negativo",
          "El móvil es inútil",
          "Tiene ventajas y desventajas",
          "No tiene opinión"
        ],
        c: 2
      },
      {
        q: "¿Qué podemos entender sobre los padres?",
        a: [
          "No saben usar tecnología",
          "Están preocupados",
          "Quieren comprar otro móvil",
          "No dicen nada"
        ],
        c: 1
      }
    ]
  },

  {
    level: "MELLAN",
    title: "Texto 6 – Viajar",
    text: `Voy a viajar a España porque quiero conocer la cultura. También quiero practicar el idioma. Estoy un poco nervioso, pero creo que es importante intentar.`,
    questions: [
      {
        q: "¿Cuál es el objetivo principal del viaje?",
        a: [
          "Trabajar",
          "Aprender y experimentar",
          "Visitar amigos",
          "Mudarse"
        ],
        c: 1
      },
      {
        q: "¿Qué actitud tiene?",
        a: [
          "Seguridad total",
          "Indiferencia",
          "Mezcla de nervios y motivación",
          "Miedo extremo"
        ],
        c: 2
      },
      {
        q: "¿Qué significa “intentar” en este contexto?",
        a: [
          "Probar algo aunque sea difícil",
          "Evitar algo",
          "Olvidar algo",
          "Decidir algo"
        ],
        c: 0
      },
      {
        q: "¿Cuál es la idea principal?",
        a: [
          "Viajar para aprender",
          "Viajar es peligroso",
          "España es cara",
          "No le gusta viajar"
        ],
        c: 0
      }
    ]
  },

  {
    level: "UTMANING",
    title: "Texto 7 – Futuro",
    text: `He empezado a pensar en mi futuro. No sé exactamente qué quiero hacer, pero me interesan los idiomas porque permiten conocer otras culturas. A veces es difícil, pero me motiva aprender.`,
    questions: [
      {
        q: "¿Qué podemos entender sobre su situación?",
        a: [
          "Tiene todo claro",
          "Está explorando opciones",
          "No quiere estudiar",
          "Ya tiene trabajo"
        ],
        c: 1
      },
      {
        q: "¿Por qué son importantes los idiomas?",
        a: [
          "Porque son fáciles",
          "Porque permiten conocer otras culturas",
          "Porque son obligatorios",
          "Porque todos los hablan"
        ],
        c: 1
      },
      {
        q: "¿Qué indica “aunque es difícil”?",
        a: [
          "Va a dejarlo",
          "Tiene dificultades pero sigue",
          "No entiende nada",
          "No quiere continuar"
        ],
        c: 1
      },
      {
        q: "¿Cuál es el tono del texto?",
        a: [
          "Negativo",
          "Reflexivo y motivado",
          "Confundido y enfadado",
          "Indiferente"
        ],
        c: 1
      }
    ]
  },

  {
    level: "UTMANING",
    title: "Texto 8 – Medio ambiente",
    text: `Creo que todos podemos hacer algo por el medio ambiente. No es fácil cambiar hábitos, pero pequeñas acciones pueden ayudar. Intento consumir menos y reciclar más.`,
    questions: [
      {
        q: "¿Cuál es la idea principal?",
        a: [
          "El problema es imposible",
          "Las acciones individuales importan",
          "Solo los gobiernos pueden ayudar",
          "No hay solución"
        ],
        c: 1
      },
      {
        q: "¿Qué significa “sin embargo”?",
        a: [
          "Porque",
          "Pero",
          "Entonces",
          "También"
        ],
        c: 1
      },
      {
        q: "¿Qué actitud muestra el hablante?",
        a: [
          "Pasiva",
          "Responsable",
          "Indiferente",
          "Negativa"
        ],
        c: 1
      },
      {
        q: "¿Qué podemos inferir?",
        a: [
          "No hace nada",
          "Intenta cambiar su comportamiento",
          "No cree en el problema",
          "Quiere viajar"
        ],
        c: 1
      }
    ]
  }

];

function render() {
  const container = document.getElementById("content");
  let number = 1;

  texts.forEach(item => {
    const section = document.createElement("section");
    section.className = "level";

    const header = document.createElement("div");
    header.className = "text-header";

    const title = document.createElement("h2");
    title.textContent = item.title;

    const badge = document.createElement("span");
    badge.className = "badge " + item.level.toLowerCase();
    badge.textContent = item.level;

    header.appendChild(title);
    header.appendChild(badge);
    section.appendChild(header);

    const small = document.createElement("p");
    small.className = "small";
    small.textContent = item.questions.length + " frågor";
    section.appendChild(small);

    const textBox = document.createElement("div");
    textBox.className = "textbox";
    textBox.innerHTML = `<p>${item.text}</p>`;
    section.appendChild(textBox);

    item.questions.forEach(q => {
      total++;

      const qDiv = document.createElement("div");
      qDiv.className = "question";

      const qText = document.createElement("p");
      qText.innerHTML = `<b>${number}. ${q.q}</b>`;
      qDiv.appendChild(qText);

      const feedback = document.createElement("p");
      feedback.className = "feedback";

      let locked = false;

      q.a.forEach((answer, index) => {
        const btn = document.createElement("button");
        btn.textContent = answer;

        btn.onclick = () => {
          if (locked) return;
          locked = true;

          const buttons = qDiv.querySelectorAll("button");
          buttons.forEach(b => b.disabled = true);

          if (index === q.c) {
            btn.style.backgroundColor = "var(--green)";
            btn.style.color = "white";
            feedback.textContent = "Rätt.";
            feedback.className = "feedback correct";
            score++;
          } else {
            btn.style.backgroundColor = "var(--red)";
            btn.style.color = "white";
            buttons[q.c].style.backgroundColor = "var(--green)";
            buttons[q.c].style.color = "white";
            feedback.textContent = "Fel. Rätt svar: " + q.a[q.c];
            feedback.className = "feedback wrong";
          }

          document.getElementById("score").textContent = score;
        };

        qDiv.appendChild(btn);
      });

      qDiv.appendChild(feedback);
      section.appendChild(qDiv);
      number++;
    });

    container.appendChild(section);
  });

  document.getElementById("total").textContent = total;
}

render();
</script>

</body>
</html>
