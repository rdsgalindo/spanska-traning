<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Läsförståelse – Spanska</title>

<style>
body {
  font-family: "Times New Roman", serif;
  background: white;
  color: black;
  max-width: 760px;
  margin: auto;
  padding: 30px;
  line-height: 1.6;
}

h1 {
  text-align: center;
  font-size: 26px;
}

h2 {
  font-size: 21px;
  margin-top: 35px;
  border-bottom: 1px solid black;
  padding-bottom: 4px;
}

nav {
  margin-bottom: 25px;
  text-align: center;
}

nav a {
  margin: 0 10px;
  text-decoration: none;
  color: black;
}

.scorebox {
  border: 1px solid black;
  padding: 10px;
  margin-bottom: 25px;
  font-weight: bold;
}

.level {
  font-style: italic;
  margin-bottom: 8px;
}

.textbox {
  margin: 15px 0 20px 0;
}

.question {
  margin-top: 18px;
}

button {
  display: block;
  margin: 6px 0;
  padding: 7px;
  width: 100%;
  border: 1px solid black;
  background: white;
  color: black;
  text-align: left;
  font-family: "Times New Roman", serif;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #eeeeee;
}

button:disabled {
  cursor: default;
}

.feedback {
  font-weight: bold;
  margin-top: 5px;
}

.correct {
  color: green;
}

.wrong {
  color: red;
}

hr {
  margin: 35px 0;
  border: none;
  border-top: 1px solid black;
}
</style>
</head>

<body>

<h1>Läsförståelse – Spanska</h1>

<nav>
  <a href="index.html">Startsida</a>
  <a href="grammatik.html">Grammatik</a>
  <a href="diagnos.html">Diagnos</a>
</nav>

<div class="scorebox">
  Poäng: <span id="score">0</span> / <span id="total">0</span>
</div>

<div id="content"></div>

<script>
let score = 0;
let total = 0;

const texts = [
  {
    level: "BAS",
    title: "Texto 1 – Presentación",
    text: `Hola, me llamo Ana y tengo quince años. Vivo en Estocolmo con mi madre, mi padre y mi hermano. En mi familia hablamos sueco en casa, pero yo también estudio inglés y español en la escuela.

Normalmente me levanto a las siete y voy a la escuela a las ocho. Tengo muchas asignaturas, pero me gusta más español porque es divertido y diferente. No me gustan mucho las matemáticas porque a veces son difíciles y no siempre las entiendo.

Después de la escuela suelo escuchar música o hablar con mis amigos. Los fines de semana descanso más y paso tiempo con mi familia.`,
    questions: [
      {
        q:"¿Qué podemos entender sobre la vida de Ana?",
        a:["Trabaja todo el día","Vive con su familia y estudia","Viaja constantemente","No va a la escuela"],
        c:1
      },
      {
        q:"¿Por qué no le gustan las matemáticas?",
        a:["Porque son aburridas","Porque son difíciles","Porque no tiene profesor","Porque no tiene tiempo"],
        c:1
      },
      {
        q:"¿Qué hace normalmente después de la escuela?",
        a:["Estudia matemáticas","Trabaja","Escucha música o habla con amigos","Viaja"],
        c:2
      },
      {
        q:"¿Cuál es la idea principal del texto?",
        a:["Su trabajo","Su rutina y vida diaria","Un viaje","Sus amigos"],
        c:1
      }
    ]
  },

  {
    level: "BAS",
    title: "Texto 2 – Mi familia",
    text: `Me llamo Carlos y vivo con mi familia en una ciudad pequeña. En casa somos cinco personas: mis padres, mis dos hermanas y yo.

Mi madre trabaja en una tienda y mi padre es profesor. Mis hermanas son más pequeñas que yo y hablan mucho. A veces es divertido, pero otras veces necesito tranquilidad.

Me gusta pasar tiempo con mi familia, especialmente los fines de semana, cuando comemos juntos o vemos películas. Sin embargo, también es importante para mí tener tiempo solo para descansar o escuchar música.`,
    questions: [
      {
        q:"¿Cómo es la familia de Carlos?",
        a:["Muy pequeña","Muy grande","De tamaño medio","Solo dos personas"],
        c:2
      },
      {
        q:"¿Qué podemos entender sobre sus hermanas?",
        a:["Son mayores","Hablan poco","Hablan mucho","No viven en casa"],
        c:2
      },
      {
        q:"¿Qué significa que necesita tranquilidad?",
        a:["Quiere más ruido","Quiere estar solo a veces","Quiere salir","Quiere estudiar"],
        c:1
      },
      {
        q:"¿Cuál es la idea principal?",
        a:["El trabajo","Descripción de su familia y vida en casa","Un problema grave","La escuela"],
        c:1
      }
    ]
  },

  {
    level: "BAS",
    title: "Texto 3 – En la tienda",
    text: `Hoy voy a una tienda de ropa porque necesito una camiseta nueva. Me gustan las camisetas azules y verdes porque son colores tranquilos.

En la tienda hablo con una dependienta. Ella me pregunta qué talla necesito y yo digo que mediana. También miro el precio porque no quiero gastar demasiado dinero.

Al final compro una camiseta azul porque es bonita, cómoda y no es muy cara. Creo que es una buena decisión.`,
    questions: [
      {
        q:"¿Qué influye en su decisión?",
        a:["Solo el color","El precio y el aspecto","La música","El tamaño de la tienda"],
        c:1
      },
      {
        q:"¿Qué podemos entender sobre la compra?",
        a:["Es una compra impulsiva","Es una decisión pensada","No compra nada","Compra para otra persona"],
        c:1
      },
      {
        q:"¿Qué significa “no gastar demasiado dinero”?",
        a:["Comprar mucho","Ahorrar","Comprar caro","No pagar"],
        c:1
      },
      {
        q:"¿Cuál es el propósito del texto?",
        a:["Describir una compra","Comparar tiendas","Explicar precios","Hablar de moda en general"],
        c:0
      }
    ]
  },

  {
    level: "MELLAN",
    title: "Texto 4 – Rutina",
    text: `Durante la semana tengo una rutina bastante normal. Me levanto temprano y voy a la escuela todos los días. Tengo varias asignaturas, como matemáticas, historia y educación física.

Me gusta educación física porque puedo moverme y no estoy sentado todo el tiempo. También me interesa la historia porque aprendo sobre el pasado y entiendo mejor el mundo.

Después de la escuela suelo hacer los deberes. Si tengo tiempo, veo a mis amigos o juego al fútbol. Algunos días estoy cansado, pero intento organizar mi tiempo para hacer todo.`,
    questions: [
      {
        q:"¿Cómo es su rutina?",
        a:["Muy especial","Bastante normal","Muy difícil","Muy corta"],
        c:1
      },
      {
        q:"¿Qué podemos entender sobre sus intereses?",
        a:["Solo deporte","Solo teoría","Intereses variados","No le gusta nada"],
        c:2
      },
      {
        q:"¿Qué indica “intento organizar mi tiempo”?",
        a:["Tiene problemas","Intenta ser responsable","No hace nada","No estudia"],
        c:1
      },
      {
        q:"¿Cuál es la idea principal?",
        a:["Problemas en la escuela","Descripción de su rutina","Sus amigos","Un viaje"],
        c:1
      }
    ]
  },

  {
    level: "MELLAN",
    title: "Texto 5 – El móvil",
    text: `Uso el móvil todos los días para hablar con mis amigos, escuchar música y ver vídeos. Me gusta mucho, pero sé que paso demasiado tiempo con él.

Mis padres piensan que debería usarlo menos porque no es bueno estar tantas horas delante de la pantalla. Yo entiendo su opinión, pero también creo que el móvil puede ser útil.

Por ejemplo, puedo aprender cosas nuevas o practicar idiomas. Creo que lo importante es usarlo de forma responsable.`,
    questions: [
      {
        q:"¿Cuál es el conflicto principal?",
        a:["No tiene móvil","Uso excesivo","Problemas técnicos","No tiene amigos"],
        c:1
      },
      {
        q:"¿Qué actitud tiene el hablante?",
        a:["Negativa","Equilibrada","Indiferente","Confundida"],
        c:1
      },
      {
        q:"¿Qué podemos entender sobre los padres?",
        a:["No saben nada","Están preocupados","No opinan","Quieren comprar otro móvil"],
        c:1
      },
      {
        q:"¿Cuál es la idea principal?",
        a:["El móvil es malo","El móvil es bueno","Depende del uso","No importa"],
        c:2
      }
    ]
  },

  {
    level: "MELLAN",
    title: "Texto 6 – Viajar",
    text: `Este verano voy a viajar a España con mi familia. Queremos visitar varias ciudades y conocer la cultura.

Para mí es importante practicar el idioma en situaciones reales, como en tiendas o restaurantes. Estoy un poco nervioso porque no hablo perfectamente, pero quiero intentarlo.

Creo que viajar es una buena forma de aprender porque ves cosas nuevas y entiendes mejor a otras personas.`,
    questions: [
      {
        q:"¿Cuál es el objetivo del viaje?",
        a:["Trabajar","Aprender","Comprar","Descansar"],
        c:1
      },
      {
        q:"¿Qué actitud tiene?",
        a:["Miedo total","Motivación con nervios","Indiferencia","Confusión"],
        c:1
      },
      {
        q:"¿Qué significa “intentarlo”?",
        a:["Evitar","Probar","Olvidar","Decidir"],
        c:1
      },
      {
        q:"¿Cuál es la idea principal?",
        a:["Viajar es caro","Viajar ayuda a aprender","España es mejor","No viajar"],
        c:1
      }
    ]
  },

  {
    level: "UTMANING",
    title: "Texto 7 – Futuro",
    text: `Últimamente he empezado a pensar más en mi futuro. No sé exactamente qué quiero hacer, pero me interesan los idiomas porque permiten conocer otras culturas.

A veces estudiar es difícil, especialmente cuando hay muchas palabras nuevas, pero cuando veo progreso me siento motivado.

Creo que en el futuro me gustaría estudiar o trabajar en otro país. Para mí es importante aprender y seguir desarrollándome.`,
    questions: [
      {
        q:"¿Qué podemos entender sobre su situación?",
        a:["Tiene todo claro","Está explorando opciones","No quiere estudiar","Tiene trabajo"],
        c:1
      },
      {
        q:"¿Qué le motiva?",
        a:["El dinero","El progreso","La familia","Los amigos"],
        c:1
      },
      {
        q:"¿Qué indica el texto?",
        a:["Confusión total","Interés por aprender","Rechazo","Indiferencia"],
        c:1
      },
      {
        q:"¿Cuál es el tono?",
        a:["Negativo","Reflexivo","Enfadado","Indiferente"],
        c:1
      }
    ]
  },

  {
    level: "UTMANING",
    title: "Texto 8 – Medio ambiente",
    text: `Creo que todos podemos hacer algo por el medio ambiente. No siempre es fácil cambiar hábitos, pero pequeñas acciones pueden marcar la diferencia.

En mi familia reciclamos y tratamos de consumir menos. Antes no pensaba mucho en esto, pero ahora intento ser más responsable.

No creo que una sola persona pueda cambiar todo, pero muchas pequeñas acciones juntas pueden tener un efecto importante.`,
    questions: [
      {
        q:"¿Cuál es la idea principal?",
        a:["Es imposible cambiar","Las acciones pequeñas importan","Solo gobiernos ayudan","No hay problema"],
        c:1
      },
      {
        q:"¿Qué actitud muestra?",
        a:["Pasiva","Responsable","Indiferente","Negativa"],
        c:1
      },
      {
        q:"¿Qué podemos inferir?",
        a:["No hace nada","Está cambiando hábitos","No cree en el problema","Viaja mucho"],
        c:1
      },
      {
        q:"¿Qué significa “marcar la diferencia”?",
        a:["Göra skillnad","Resa","Arbeta","Köpa"],
        c:0
      }
    ]
  }
];

function render() {
  const container = document.getElementById("content");
  let questionNumber = 1;

  texts.forEach(item => {
    const section = document.createElement("section");

    const level = document.createElement("p");
    level.className = "level";
    level.textContent = item.level;
    section.appendChild(level);

    const title = document.createElement("h2");
    title.textContent = item.title;
    section.appendChild(title);

    const textBox = document.createElement("div");
    textBox.className = "textbox";
    textBox.innerHTML = item.text.split("\\n").map(p => `<p>${p}</p>`).join("");
    section.appendChild(textBox);

    item.questions.forEach(q => {
      total++;

      const qDiv = document.createElement("div");
      qDiv.className = "question";

      const qText = document.createElement("p");
      qText.innerHTML = `<b>${questionNumber}. ${q.q}</b>`;
      qDiv.appendChild(qText);

      const feedback = document.createElement("p");
      feedback.className = "feedback";

      let locked = false;

      q.a.forEach((answer, index) => {
        const btn = document.createElement("button");
        btn.textContent = answer;

        btn.onclick = () => {
          if (locked) return;
          locked = true;

          const buttons = qDiv.querySelectorAll("button");
          buttons.forEach(b => b.disabled = true);

          if (index === q.c) {
            btn.style.background = "green";
            btn.style.color = "white";
            feedback.textContent = "Rätt.";
            feedback.className = "feedback correct";
            score++;
          } else {
            btn.style.background = "red";
            btn.style.color = "white";
            buttons[q.c].style.background = "green";
            buttons[q.c].style.color = "white";
            feedback.textContent = "Fel. Rätt svar: " + q.a[q.c];
            feedback.className = "feedback wrong";
          }

          document.getElementById("score").textContent = score;
        };

        qDiv.appendChild(btn);
      });

      qDiv.appendChild(feedback);
      section.appendChild(qDiv);
      questionNumber++;
    });

    const hr = document.createElement("hr");
    section.appendChild(hr);

    container.appendChild(section);
  });

  document.getElementById("total").textContent = total;
}

render();
</script>

</body>
</html>
